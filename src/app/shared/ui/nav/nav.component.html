<nav class="sticky top-0 z-50 bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex-shrink-0">
        <h1
          class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
          Danish Ahmad
        </h1>
      </div>

      <div class="hidden md:flex space-x-8">
        @for (link of navLinks; track link) {
        <a
           (click)="scrollToSection(link)"
           [class]="
             'relative text-gray-600 hover:text-blue-600 transition-colors duration-300 py-2 cursor-pointer ' +
             (activeSection() === link ? 'text-blue-600' : '')
           ">
          {{ link | titlecase }}
          <span
            [class]="
              'absolute bottom-0 left-0 h-0.5 bg-blue-600 transition-all duration-300 ' +
              (activeSection() === link ? 'w-full' : 'w-0')
            "></span>
        </a>
        }
      </div>

      <div class="flex items-center gap-4">
        <a
           href="https://linkedin.com/in/danishahmad8321"
           target="_blank"
           rel="noopener noreferrer"
           class="text-gray-600 hover:text-blue-600 transition-colors">
          <i class="fab fa-linkedin text-xl"></i>
        </a>
        <a
           href="mailto:danish.8321@gmail.com"
           class="text-gray-600 hover:text-blue-600 transition-colors">
          <i class="fas fa-envelope text-xl"></i>
        </a>
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden text-gray-600 hover:text-blue-600">
          <i [class]="mobileMenuOpen() ? 'fas fa-times text-2xl' : 'fas fa-bars text-2xl'"></i>
        </button>
      </div>
    </div>

    @if (mobileMenuOpen()) {
    <div class="md:hidden py-4 space-y-2">
      @for (link of navLinks; track link) {
      <button
        (click)="scrollToSection(link)"
        class="block w-full text-left px-4 py-2 text-gray-600 hover:bg-gray-100">
        {{ link | titlecase }}
      </button>
      }
    </div>
    }
  </div>
</nav>
